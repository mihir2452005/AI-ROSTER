name: Daily database backup

# Dumps the Neon database to a JSON file and commits it to a
# `backups/` folder in THIS repo (not a separate one).
#
# Why this design:
#   - No second repo to create or maintain
#   - No fine-grained PAT to generate or rotate
#   - The auto-provided `GITHUB_TOKEN` already has write access
#     to the repo that triggered the workflow
#   - One fewer secret to misconfigure
#
# The actual database dump still uses the existing
# `python -m scripts.backup_db --output ...` command, so the
# on-disk format is identical to a local backup.

on:
  schedule:
    # 02:13 UTC every day. Adjust to your timezone if needed.
    - cron: "13 2 * * *"
  # Allow manual trigger from the Actions tab.
  workflow_dispatch:

# We need write access to commit the backup file back to the repo.
# This is the only permission we ask for; the workflow does not run
# on PRs from forks so `GITHUB_TOKEN` is not exposed to untrusted
# code.
permissions:
  contents: write

concurrency:
  # Prevent two backups from racing each other if a previous run
  # is still finishing.
  group: backup
  cancel-in-progress: false

jobs:
  backup:
    name: Dump Neon -> commit to backups/ folder
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out app code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run the backup to a local file
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Cap how big a single row can be (default 10 MB).
          BACKUP_MAX_CELL_BYTES: "10485760"
        run: |
          mkdir -p ../backups
          ts=$(date -u +%Y%m%d-%H%M%S)
          out="../backups/backup-${ts}.json"
          python -m scripts.backup_db --output "${out}"
          echo "BACKUP_FILE=${out}" >> "$GITHUB_ENV"
          echo "Wrote $(wc -c < ${out}) bytes to ${out}"

      - name: Commit and push the backup file
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          # If nothing changed (e.g. database is empty and the
          # empty-schema JSON is byte-identical to last run), don't
          # create an empty commit.
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "backup: $(date -u +%Y-%m-%d\ %H:%M:%S)\ UTC"
          git push

      - name: Verify the backup landed
        working-directory: backend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BACKUP_REPO:  ${{ github.repository }}
        run: |
          python -m scripts.verify_backup_gh
